<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POGODA // JAKDZISIAJ.PL</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { font-size: 16px; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    min-height: 100vh;
    padding: clamp(20px, 4vw, 56px) clamp(20px, 5vw, 72px);
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 999;
  }

  /* ── CLOCK ── */
  .clock {
    font-size: clamp(7px, 1vw, 10px);
    color: #333;
    letter-spacing: 3px;
    margin-bottom: clamp(28px, 4vw, 52px);
  }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    gap: clamp(24px, 4vw, 72px);
    align-items: flex-start;
  }

  .col-left  { flex: 1; min-width: 0; }

  .col-mid {
    width: clamp(200px, 26vw, 340px);
    flex-shrink: 0;
  }

  .col-right {
    width: clamp(150px, 18vw, 250px);
    flex-shrink: 0;
  }

  /* ── LABELS ── */
  .label {
    font-size: clamp(7px, 0.9vw, 11px);
    color: #444;
    letter-spacing: 3px;
    margin-bottom: clamp(12px, 1.5vw, 20px);
  }

  /* ── CITY ── */
  .city {
    font-size: clamp(28px, 5vw, 72px);
    line-height: 1.3;
    margin-bottom: clamp(6px, 0.8vw, 12px);
    word-break: break-word;
  }

  .coords {
    font-size: clamp(7px, 0.8vw, 10px);
    color: #333;
    letter-spacing: 2px;
    margin-bottom: clamp(28px, 4vw, 52px);
  }

  /* ── CURRENT TEMP ── */
  .temp-now {
    font-size: clamp(44px, 8vw, 100px);
    line-height: 1;
    margin: clamp(10px, 1.5vw, 20px) 0 clamp(8px, 1vw, 14px);
  }

  .temp-unit {
    font-size: clamp(14px, 2vw, 26px);
    color: #555;
    vertical-align: super;
    margin-left: 4px;
  }

  .feels {
    font-size: clamp(7px, 0.9vw, 11px);
    color: #444;
    letter-spacing: 2px;
    margin-bottom: clamp(16px, 2.5vw, 32px);
  }

  /* ── COMPARE ── */
  .compare {
    font-size: clamp(8px, 1vw, 13px);
    color: #555;
    letter-spacing: 1px;
    line-height: 2.6;
    margin-bottom: clamp(28px, 4vw, 52px);
  }

  .compare-hl {
    font-size: clamp(9px, 1.2vw, 15px);
    color: #fff;
    display: block;
    margin: clamp(8px, 1vw, 14px) 0;
    letter-spacing: 1px;
  }

  /* ── META ── */
  .meta {
    display: flex;
    gap: clamp(24px, 4vw, 64px);
    margin-bottom: clamp(28px, 4vw, 52px);
    flex-wrap: wrap;
  }

  .meta-item { display: flex; flex-direction: column; gap: clamp(6px, 0.8vw, 12px); }
  .meta-lbl  { font-size: clamp(7px, 0.8vw, 10px); color: #333; letter-spacing: 2px; }
  .meta-val  { font-size: clamp(10px, 1.4vw, 18px); }

  /* ── PERIOD ROWS ── */
  .period-row {
    display: flex;
    align-items: center;
    gap: clamp(10px, 1.5vw, 22px);
    padding: clamp(10px, 1.4vw, 18px) 0;
    border-top: 1px solid #111;
  }
  .period-row:last-child { border-bottom: 1px solid #111; }

  .pname {
    font-size: clamp(8px, 1vw, 13px);
    color: #555;
    width: clamp(72px, 9vw, 120px);
    letter-spacing: 1px;
    flex-shrink: 0;
  }
  .ptemp-wind {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .ptemp {
    font-size: clamp(10px, 1.4vw, 18px);
  }
  .pwind {
    font-size: clamp(6px, 0.75vw, 9px);
    color: #444;
    letter-spacing: 1px;
  }

  /* ── FORECAST ── */
  .forecast-row {
    display: flex;
    align-items: center;
    gap: clamp(6px, 1vw, 14px);
    padding: clamp(8px, 1.2vw, 16px) 0;
    border-top: 1px solid #111;
  }
  .forecast-row:last-child { border-bottom: 1px solid #111; }

  .fday {
    font-size: clamp(7px, 0.85vw, 11px);
    color: #444;
    width: clamp(22px, 2.8vw, 36px);
    letter-spacing: 1px;
    flex-shrink: 0;
  }
  .fday.today { color: #fff; }

  .flow {
    font-size: clamp(7px, 0.85vw, 10px);
    color: #444;
    min-width: clamp(18px, 2.5vw, 30px);
    text-align: right;
    flex-shrink: 0;
  }
  .fhigh {
    font-size: clamp(8px, 1vw, 12px);
    min-width: clamp(18px, 2.5vw, 30px);
    text-align: right;
    flex-shrink: 0;
  }

  .range-wrap {
    flex: 1;
    height: 2px;
    background: #111;
    position: relative;
    min-width: 20px;
  }
  .range-fill {
    position: absolute;
    top: 0;
    height: 2px;
    background: #fff;
    opacity: 0.2;
  }

  /* ── LOADING ── */
  .loading {
    font-size: clamp(8px, 1.2vw, 14px);
    color: #333;
    letter-spacing: 3px;
    animation: blink 1s step-end infinite;
    padding-top: 40px;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }

  /* ── LOCATION PROMPT ── */
  .loc-screen {
    display: flex;
    flex-direction: column;
    gap: clamp(16px, 2vw, 28px);
    padding-top: clamp(20px, 3vh, 40px);
  }
  .loc-top-label {
    font-size: clamp(6px, 0.8vw, 9px);
    color: #333;
    letter-spacing: 3px;
  }
  .loc-title {
    font-size: clamp(12px, 2vw, 22px);
    color: #fff;
    line-height: 1.8;
  }
  .loc-actions {
    display: flex;
    gap: clamp(10px, 1.5vw, 20px);
    flex-wrap: wrap;
    align-items: center;
  }
  .loc-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(7px, 0.85vw, 10px);
    color: #000;
    background: #fff;
    border: none;
    padding: clamp(8px, 1.2vw, 14px) clamp(12px, 2vw, 24px);
    cursor: pointer;
    letter-spacing: 2px;
  }
  .loc-btn:hover  { background: #ccc; }
  .loc-btn:active { background: #888; }
  .loc-btn.ghost {
    color: #555;
    background: transparent;
    border: 1px solid #222;
  }
  .loc-btn.ghost:hover { border-color: #444; color: #aaa; }

  .loc-error-msg {
    font-size: clamp(6px, 0.75vw, 9px);
    color: #444;
    letter-spacing: 1px;
    line-height: 2.4;
  }

  /* MAP PICKER */
  .map-picker {
    display: flex;
    gap: clamp(20px, 3vw, 48px);
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .map-wrap {
    flex: 1;
    min-width: 260px;
    position: relative;
  }
  .map-wrap svg { display: block; width: 100%; height: auto; }

  /* city dots on map */
  .map-city {
    cursor: pointer;
    transition: none;
  }
  .map-city circle {
    fill: #333;
    stroke: #555;
    stroke-width: 1;
  }
  .map-city:hover circle, .map-city.active circle {
    fill: #fff;
    stroke: #fff;
  }
  .map-city text {
    fill: #555;
    font-family: 'Press Start 2P', monospace;
    font-size: 5px;
    pointer-events: none;
  }
  .map-city:hover text, .map-city.active text { fill: #fff; }

  /* right sidebar */
  .map-sidebar {
    width: clamp(180px, 22vw, 280px);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .sidebar-label {
    font-size: clamp(6px, 0.75vw, 9px);
    color: #333;
    letter-spacing: 3px;
    margin-bottom: 4px;
  }
  .city-search {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(7px, 0.9vw, 10px);
    background: #000;
    color: #fff;
    border: 1px solid #333;
    padding: clamp(8px, 1.2vw, 14px) clamp(10px, 1.5vw, 16px);
    letter-spacing: 2px;
    outline: none;
    width: 100%;
    caret-color: #fff;
  }
  .city-search:focus { border-color: #555; }
  .city-search::placeholder { color: #222; }

  .search-results {
    display: flex;
    flex-direction: column;
    gap: 0;
    max-height: 300px;
    overflow-y: auto;
  }
  .search-result {
    font-size: clamp(7px, 0.85vw, 10px);
    color: #666;
    padding: clamp(8px, 1vw, 12px) clamp(10px, 1.5vw, 14px);
    border-top: 1px solid #111;
    cursor: pointer;
    letter-spacing: 1px;
    line-height: 1.8;
  }
  .search-result:last-child { border-bottom: 1px solid #111; }
  .search-result:hover, .search-result.active { color: #fff; background: #0a0a0a; }
  .search-result .sr-coords {
    display: block;
    font-size: clamp(5px, 0.6vw, 7px);
    color: #333;
    margin-top: 4px;
  }

  .selected-city-info {
    font-size: clamp(7px, 0.85vw, 10px);
    color: #666;
    letter-spacing: 1px;
    line-height: 2.2;
    padding: clamp(10px, 1.2vw, 14px) 0;
    border-top: 1px solid #111;
  }
  .selected-city-info .sci-name { color: #fff; font-size: clamp(9px, 1.1vw, 13px); display: block; margin-bottom: 6px; }

  .search-loading {
    font-size: clamp(6px, 0.75vw, 9px);
    color: #333;
    letter-spacing: 2px;
    padding: 12px 0;
    animation: blink 1s step-end infinite;
  }

  @media (max-width: 640px) {
    .map-picker { flex-direction: column; }
    .map-sidebar { width: 100%; }
  }

  .px-icon {
    display: inline-block;
    image-rendering: pixelated;
    vertical-align: middle;
    flex-shrink: 0;
  }

  /* ══════════════════════════════════════════
     MOBILE — single column, all stacked
  ══════════════════════════════════════════ */
  @media (max-width: 640px) {
    body { padding: 24px 20px; }

    .layout {
      flex-direction: column;
      gap: 40px;
    }

    .col-mid   { width: 100%; }
    .col-right { width: 100%; }

    .city      { font-size: clamp(26px, 9vw, 44px); }
    .temp-now  { font-size: clamp(52px, 18vw, 80px); }

    .meta { gap: 28px; }

    .pname { width: 80px; }

    .forecast-row { gap: 8px; }
  }

  /* ══════════════════════════════════════════
     TABLET — tighter columns
  ══════════════════════════════════════════ */
  @media (min-width: 641px) and (max-width: 1024px) {
    .col-mid   { width: clamp(160px, 28vw, 240px); }
    .col-right { width: clamp(130px, 22vw, 180px); }
    .city      { font-size: clamp(24px, 4.5vw, 48px); }
  }

  /* ══════════════════════════════════════════
     LARGE SCREENS — give things more room
  ══════════════════════════════════════════ */
  @media (min-width: 1600px) {
    body { padding: 64px 96px; }
    .city      { font-size: clamp(56px, 4.5vw, 88px); }
    .temp-now  { font-size: clamp(80px, 7vw, 120px); }
    .col-mid   { width: 360px; }
    .col-right { width: 280px; }
  }
</style>
</head>
<body>
<!-- GATE OVERLAY -->
<div id="gate">
<style>
  #gate {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-family: 'Press Start 2P', monospace;
  }
  #gate.hidden { display: none; }

  .gate-scene {
    width: 100%;
    max-width: 640px;
    margin-bottom: clamp(24px, 4vw, 48px);
    position: relative;
  }

  .gate-title {
    font-size: clamp(9px, 1.4vw, 16px);
    color: #fff;
    letter-spacing: 3px;
    text-align: center;
    margin-bottom: clamp(8px, 1.5vw, 16px);
  }

  .gate-sub {
    font-size: clamp(6px, 0.85vw, 9px);
    color: #444;
    letter-spacing: 2px;
    text-align: center;
    line-height: 2.6;
    margin-bottom: clamp(28px, 4vw, 48px);
  }

  .gate-sub span { color: #666; }

  .gate-input-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .gate-label {
    font-size: clamp(6px, 0.8vw, 9px);
    color: #333;
    letter-spacing: 3px;
  }

  .gate-input {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(9px, 1.2vw, 14px);
    background: #000;
    color: #fff;
    border: 1px solid #333;
    padding: clamp(10px, 1.5vw, 16px) clamp(14px, 2vw, 24px);
    letter-spacing: 3px;
    outline: none;
    width: clamp(200px, 40vw, 360px);
    text-align: center;
    caret-color: #fff;
  }
  .gate-input:focus { border-color: #666; }
  .gate-input::placeholder { color: #222; }

  .gate-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(8px, 1vw, 12px);
    color: #000;
    background: #fff;
    border: none;
    padding: clamp(10px, 1.5vw, 16px) clamp(18px, 3vw, 32px);
    cursor: pointer;
    letter-spacing: 2px;
  }
  .gate-btn:hover  { background: #ccc; }
  .gate-btn:active { background: #888; }

  .gate-error {
    font-size: clamp(6px, 0.8vw, 9px);
    color: #555;
    letter-spacing: 2px;
    min-height: 20px;
    text-align: center;
    animation: blink2 0.5s step-end 3;
  }
  @keyframes blink2 { 0%,100%{opacity:1} 50%{opacity:0} }

  /* scanlines on gate too */
  #gate::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 1;
  }
  #gate > * { position: relative; z-index: 2; }
</style>

      const clone = err.cloneNode(true);
      err.parentNode.replaceChild(clone, err);

// icon size — scales with viewport
function iconSize(base) {
  const w = window.innerWidth;
  if (w < 480)  return Math.round(base * 1.4);
  if (w < 768)  return Math.round(base * 1.2);
  if (w > 1600) return Math.round(base * 1.6);
  return base;
}

function wmoIcon(code, base) {
  const size = iconSize(base);
  if (code === 0)  return pxIcon(ICONS.sun,     size);
  if (code <= 2)   return pxIcon(ICONS.partly,  size);
  if (code === 3)  return pxIcon(ICONS.cloud,   size);
  if (code <= 48)  return pxIcon(ICONS.fog,     size);
  if (code <= 67)  return pxIcon(ICONS.rain,    size);
  if (code <= 77)  return pxIcon(ICONS.snow,    size);
  if (code <= 82)  return pxIcon(ICONS.rain,    size);
  if (code <= 86)  return pxIcon(ICONS.snow,    size);
  return pxIcon(ICONS.thunder, size);
}

function wmoDesc(code) {
  if (code === 0)  return 'BEZCHMURNIE';
  if (code <= 2)   return 'CZ. ZACHMURZENIE';
  if (code === 3)  return 'POCHMURNO';
  if (code <= 48)  return 'MGLA';
  if (code <= 55)  return 'MZAWKA';
  if (code <= 67)  return 'DESZCZ';
  if (code <= 77)  return 'SNIEG';
  if (code <= 82)  return 'PRZELOTNY DESZCZ';
  if (code <= 86)  return 'OPADY SNIEGU';
  return 'BURZA';
}

const pad = n => String(n).padStart(2,'0');

async function getCityName(lat, lon) {
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=pl`);
    const d = await r.json();
    return (d.address?.city || d.address?.town || d.address?.village || 'TWOJA LOKALIZACJA').toUpperCase();
  } catch { return 'TWOJA LOKALIZACJA'; }
}

async function fetchWeather(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
    + `&hourly=temperature_2m,weathercode,windspeed_10m,apparent_temperature`
    + `&daily=weathercode,temperature_2m_max,temperature_2m_min`
    + `&timezone=auto&past_days=1&forecast_days=11`;
  return (await fetch(url)).json();
}

function render(data, city, lat, lon) {
  const h = data.hourly, d = data.daily;
  const now = new Date();
  const todayStr = now.toISOString().slice(0,10);
  const tIdx = d.time.findIndex(t => t === todayStr);
  const yIdx = tIdx - 1;
  const hOff = h.time.findIndex(t => t.startsWith(todayStr));
  const curI = hOff + now.getHours();

  const curTemp  = Math.round(h.temperature_2m[curI]);
  const curFeels = Math.round(h.apparent_temperature[curI]);
  const curCode  = h.weathercode[curI];
  const curWind  = Math.round(h.windspeed_10m[curI]);
  const todayMax = d.temperature_2m_max[tIdx];
  const todayMin = d.temperature_2m_min[tIdx];
  const yestMax  = yIdx >= 0 ? d.temperature_2m_max[yIdx] : todayMax;
  const diff     = todayMax - yestMax;

  const arrKey = diff > 2 ? 'arrUp' : diff < -2 ? 'arrDn' : 'arrEq';
  const cmpTxt = diff > 2
    ? `CIEPLEJ NIZ WCZORAJ (+${Math.round(diff)}C)`
    : diff < -2
    ? `CHLODNIEJ NIZ WCZORAJ (${Math.round(diff)}C)`
    : 'PODOBNIE JAK WCZORAJ';

  const partsHTML = PARTS.map(p => {
    const temps = h.temperature_2m.slice(hOff+p.s, hOff+p.e);
    const winds = h.windspeed_10m.slice(hOff+p.s, hOff+p.e);
    const codes = h.weathercode.slice(hOff+p.s, hOff+p.e);
    const code  = codes[Math.floor(codes.length/2)] || 0;
    return `<div class="period-row">
      <span class="pname">${p.name}</span>
      ${wmoIcon(code, 20)}
      <div class="ptemp-wind">
        <span class="ptemp">${Math.round(avg(temps))}°C</span>
        <span class="pwind">${Math.round(avg(winds))} KM/H</span>
      </div>
    </div>`;
  }).join('');

  const forecast = [];
  for (let i = tIdx; i < Math.min(tIdx+10, d.time.length); i++) {
    const dt = new Date(d.time[i]+'T12:00:00');
    forecast.push({
      name: DAYS[dt.getDay()],
      today: i===tIdx,
      code: d.weathercode[i],
      hi: Math.round(d.temperature_2m_max[i]),
      lo: Math.round(d.temperature_2m_min[i]),
    });
  }
  const allLo = forecast.map(f=>f.lo), allHi = forecast.map(f=>f.hi);
  const minT = Math.min(...allLo), maxT = Math.max(...allHi), rng = maxT-minT||1;

  const forecastHTML = forecast.map(f => {
    const bL = ((f.lo-minT)/rng*100).toFixed(1);
    const bW = ((f.hi-f.lo)/rng*100).toFixed(1);
    return `<div class="forecast-row">
      <span class="fday${f.today?' today':''}">${f.name}</span>
      ${wmoIcon(f.code, 16)}
      <span class="flow">${f.lo}°</span>
      <div class="range-wrap"><div class="range-fill" style="left:${bL}%;width:${bW}%"></div></div>
      <span class="fhigh">${f.hi}°</span>
    </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="clock" id="clk">${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}</div>
    <div class="layout">
      <div class="col-left">
        <div class="label">WITAJ W</div>
        <div class="city">${city}</div>
        <div class="coords">${lat.toFixed(4)} N  ${lon.toFixed(4)} E</div>

        ${wmoIcon(curCode, 48)}
        <div class="temp-now">${curTemp}<span class="temp-unit">°C</span></div>
        <div class="feels">ODCZUWALNA ${curFeels}°C</div>

        <div class="compare">
          POGODA JEST
          <span class="compare-hl">${pxIcon(ICONS[arrKey], iconSize(12))} ${cmpTxt}</span>
          ${wmoDesc(curCode)}
        </div>

        <div class="meta">
          <div class="meta-item">
            <span class="meta-lbl">WIATR</span>
            <span class="meta-val">${curWind} KM/H</span>
          </div>
          <div class="meta-item">
            <span class="meta-lbl">MAKS</span>
            <span class="meta-val">${Math.round(todayMax)}°C</span>
          </div>
          <div class="meta-item">
            <span class="meta-lbl">MIN</span>
            <span class="meta-val">${Math.round(todayMin)}°C</span>
          </div>
        </div>
      </div>

      <div class="col-mid">
        <div class="label">POGODA NA CALY DZIEN</div>
        ${partsHTML}
      </div>

      <div class="col-right">
        <div class="label">PROGNOZA 10 DNI</div>
        ${forecastHTML}
      </div>
    </div>`;

  setInterval(() => {
    const n = new Date(), el = document.getElementById('clk');
    if (el) el.textContent = `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  }, 1000);
}

  showSelectedInfo(c.name, c.lat, c.lon);
}

function showSelectedInfo(name, lat, lon) {
  document.getElementById('selected-info').innerHTML = `
    <div class="selected-city-info">
      <span class="sci-name">${name}</span>
      ${lat.toFixed(4)} N  ${lon.toFixed(4)} E
      <br><br>
      <button class="loc-btn" onclick="loadCityWeather()">▸ POKAZ POGODE</button>
    </div>`;
}

async function loadCityWeather() {
  if (!selectedCity) return;
  document.getElementById('app').innerHTML = `<div class="loading">LADOWANIE POGODY...</div>`;
  try {
    const { lat, lon, name } = selectedCity;
    const data = await fetchWeather(lat, lon);
    render(data, name, lat, lon);
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="loading">BLAD: ${e.message}</div>`;
  }
}

function onSearchInput(val) {
  clearTimeout(searchTimeout);
  const el = document.getElementById('search-results');
  if (!val || val.length < 2) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="search-loading">SZUKAM...</div>`;
  searchTimeout = setTimeout(() => searchCity(val), 400);
}

async function searchCity(query) {
  const el = document.getElementById('search-results');
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&countrycodes=pl&format=json&limit=6&accept-language=pl`;
    const res = await fetch(url);
    const data = await res.json();
    searchResults = data;

    if (!data.length) {
      el.innerHTML = `<div class="search-result" style="cursor:default;color:#333">BRAK WYNIKOW</div>`;
      return;
    }

    el.innerHTML = data.map((r, i) => {
      const name = r.display_name.split(',').slice(0,2).join(', ').toUpperCase();
      const lat = parseFloat(r.lat).toFixed(4);
      const lon = parseFloat(r.lon).toFixed(4);
      return `<div class="search-result" onclick="selectSearchResult(${i})">
        ${name}
        <span class="sr-coords">${lat} N  ${lon} E</span>
      </div>`;
    }).join('');
  } catch(e) {
    el.innerHTML = `<div class="search-result" style="cursor:default;color:#333">BLAD WYSZUKIWANIA</div>`;
  }
}

function selectSearchResult(idx) {
  const r = searchResults[idx];
  if (!r) return;
  const lat = parseFloat(r.lat);
  const lon = parseFloat(r.lon);
  const name = r.display_name.split(',')[0].toUpperCase();

  // deactivate map dots
  document.querySelectorAll('.map-city').forEach(el => el.classList.remove('active'));
  // mark active in results
  document.querySelectorAll('.search-result').forEach((el,i) => {
    el.classList.toggle('active', i === idx);
  });

  selectedCity = { name, lat, lon };
  showSelectedInfo(name, lat, lon);
}

async function tryGeolocate() {
  document.getElementById('app').innerHTML = `<div class="loading">POBIERANIE LOKALIZACJI...</div>`;

  const pos = await new Promise((res, rej) =>
    navigator.geolocation.getCurrentPosition(res, rej, {
      timeout: 10000,
      enableHighAccuracy: false,
      maximumAge: 300000,
    })
  ).catch(err => { return { error: err }; });

  if (pos?.error) {
    showLocationPrompt(pos.error.code);
    return;
  }

  try {
    document.getElementById('app').innerHTML = `<div class="loading">LADOWANIE POGODY...</div>`;
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    const [data, city] = await Promise.all([fetchWeather(lat, lon), getCityName(lat, lon)]);
    render(data, city, lat, lon);
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="loading">BLAD: ${e.message}</div>`;
  }
}

async function main() {
  // Check if geolocation is supported at all
  if (!navigator.geolocation) {
    showLocationPrompt(0);
    return;
  }

  // Check existing permission state if API available
  if (navigator.permissions) {
    try {
      const perm = await navigator.permissions.query({ name: 'geolocation' });
      if (perm.state === 'denied') {
        showLocationPrompt(1);
        return;
      }
      if (perm.state === 'granted') {
        // Permission already granted — fetch silently
        await tryGeolocate();
        return;
      }
      // 'prompt' state — show our own prompt first for better UX
      showLocationPrompt();
      return;
    } catch(_) {
      // permissions API not available, fall through
    }
  }

  // Fallback: try directly, show prompt on failure
  await tryGeolocate();
}

main().catch(e => {
  document.getElementById('app').innerHTML = `<div class="loading">BLAD: ${e.message}</div>`;
});
</script>
