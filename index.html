<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAKDZISIAJ.PL</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000; color: #fff;
  font-family: 'Press Start 2P', monospace;
  min-height: 100vh;
  padding: clamp(20px,4vw,56px) clamp(20px,5vw,72px);
  padding-top: clamp(64px,7vw,92px);
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
  pointer-events: none; z-index: 998;
}

/* ── HAMBURGER ── */
.ham-btn {
  position: fixed;
  top: clamp(14px,2vw,24px); left: clamp(16px,3vw,32px);
  z-index: 1100;
  background: #000; border: none; cursor: pointer;
  padding: 8px; display: flex; flex-direction: column; gap: 5px;
}
.ham-btn span { display: block; width: clamp(20px,2vw,28px); height: 2px; background: #fff; }
.ham-btn:hover span { background: #888; }

/* ── SIDE PANEL ── */
.panel-overlay {
  position: fixed; inset: 0;
  z-index: 1040; display: none;
  background: rgba(0,0,0,0.6);
}
.panel-overlay.open { display: block; }

.side-panel {
  position: fixed; top: 0; left: 0;
  width: clamp(280px,34vw,420px); height: 100vh;
  background: #000; border-right: 1px solid #1a1a1a;
  z-index: 1050;
  transform: translateX(-100%);
  transition: transform 0.18s steps(6);
  overflow-y: auto;
  padding: clamp(64px,7vw,88px) clamp(20px,2.5vw,32px) clamp(24px,3vw,40px);
  display: flex; flex-direction: column; gap: 16px;
}
.side-panel.open { transform: translateX(0); }

.panel-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 4px;
}
.panel-title { font-size: clamp(7px,.9vw,10px); color: #333; letter-spacing: 3px; }
.panel-close { font-family: 'Press Start 2P', monospace; font-size: clamp(8px,1vw,12px); color: #333; background: none; border: none; cursor: pointer; padding: 4px; }
.panel-close:hover { color: #fff; }

/* ── SHARED ── */
.label { font-size: clamp(7px,.9vw,11px); color: #444; letter-spacing: 3px; margin-bottom: clamp(12px,1.5vw,20px); }
.px-icon { display: inline-block; image-rendering: pixelated; vertical-align: middle; flex-shrink: 0; }

/* ── LOADING ── */
.loading { font-size: clamp(8px,1.2vw,14px); color: #333; letter-spacing: 3px; animation: blink 1s step-end infinite; padding-top: clamp(40px,8vh,80px); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }

/* ── BUTTONS ── */
.px-btn { font-family: 'Press Start 2P', monospace; font-size: clamp(7px,.9vw,11px); color: #000; background: #fff; border: none; cursor: pointer; padding: clamp(10px,1.4vw,16px) clamp(14px,2.2vw,28px); letter-spacing: 2px; }
.px-btn:hover { background: #ccc; }
.px-btn:active { background: #888; }
.px-btn.ghost { color: #555; background: transparent; border: 1px solid #222; }
.px-btn.ghost:hover { border-color: #555; color: #aaa; }

/* ── DENIED SCREEN ── */
.denied-screen { padding-top: clamp(32px,6vh,64px); max-width: 680px; }
.denied-tag { font-size: clamp(6px,.8vw,9px); color: #333; letter-spacing: 3px; margin-bottom: clamp(14px,2vw,24px); }
.denied-title { font-size: clamp(14px,2.2vw,28px); color: #fff; line-height: 1.7; margin-bottom: clamp(20px,3vw,36px); }
.denied-desc { font-size: clamp(7px,.9vw,11px); color: #444; letter-spacing: 1px; line-height: 2.8; margin-bottom: clamp(24px,3.5vw,44px); }
.denied-desc strong { color: #777; font-weight: normal; }
.denied-btns { display: flex; flex-wrap: wrap; gap: clamp(10px,1.5vw,18px); }

/* ── CITY PICKER ── */
.picker-screen { display: flex; flex-direction: column; gap: clamp(16px,2.5vw,32px); }
.picker-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; margin-bottom: 4px; }
.picker-title { font-size: clamp(10px,1.5vw,18px); color: #fff; line-height: 1.7; }
.picker-layout { display: flex; gap: clamp(32px,5vw,80px); align-items: flex-start; }

/* left: alphabetical list */
.city-list-wrap { flex: 1; min-width: 0; column-count: 2; column-gap: clamp(16px,3vw,48px); }
.alpha-group { break-inside: avoid; margin-bottom: clamp(12px,2vw,22px); }
.alpha-letter { font-size: clamp(6px,.7vw,8px); color: #222; letter-spacing: 3px; border-bottom: 1px solid #111; padding-bottom: 5px; margin-bottom: 5px; }
.city-item { font-size: clamp(7px,.85vw,10px); color: #444; padding: clamp(4px,.7vw,8px) 0; border-bottom: 1px solid #0a0a0a; cursor: pointer; letter-spacing: 1px; display: block; }
.city-item:hover, .city-item.active { color: #fff; }

/* right: search */
.city-search-wrap { width: clamp(200px,26vw,320px); flex-shrink: 0; display: flex; flex-direction: column; gap: 12px; position: sticky; top: clamp(64px,7vw,88px); }
.search-label { font-size: clamp(6px,.75vw,9px); color: #333; letter-spacing: 3px; margin-bottom: 4px; }
.city-search { font-family: 'Press Start 2P', monospace; font-size: clamp(7px,.9vw,10px); background: #000; color: #fff; border: 1px solid #2a2a2a; padding: clamp(8px,1.2vw,14px) clamp(10px,1.4vw,16px); letter-spacing: 2px; outline: none; width: 100%; caret-color: #fff; }
.city-search:focus { border-color: #555; }
.city-search::placeholder { color: #1a1a1a; }
.search-results { display: flex; flex-direction: column; max-height: 55vh; overflow-y: auto; }
.sr-item { font-size: clamp(7px,.85vw,10px); color: #555; padding: clamp(7px,1vw,11px) clamp(10px,1.4vw,14px); border-top: 1px solid #0e0e0e; cursor: pointer; letter-spacing: 1px; line-height: 1.8; }
.sr-item:last-child { border-bottom: 1px solid #0e0e0e; }
.sr-item:hover, .sr-item.active { color: #fff; background: #0a0a0a; }
.sr-coords { display: block; font-size: clamp(5px,.6vw,7px); color: #2a2a2a; margin-top: 4px; }
.search-hint { font-size: clamp(6px,.75vw,9px); color: #222; letter-spacing: 2px; padding: 10px 0; animation: blink 1s step-end infinite; }
.selected-box { border-top: 1px solid #111; padding-top: 12px; display: flex; flex-direction: column; gap: 10px; }
.selected-name { font-size: clamp(9px,1.1vw,14px); color: #fff; }
.selected-coord { font-size: clamp(6px,.7vw,8px); color: #333; letter-spacing: 1px; }

/* ── WEATHER LAYOUT ── */
.clock { font-size: clamp(7px,1vw,10px); color: #333; letter-spacing: 3px; margin-bottom: clamp(28px,4vw,52px); }
.layout { display: flex; gap: clamp(24px,4vw,72px); align-items: flex-start; }
.col-left  { flex: 1; min-width: 0; }
.col-mid   { width: clamp(200px,26vw,340px); flex-shrink: 0; }
.col-right { width: clamp(150px,18vw,250px); flex-shrink: 0; }
.city-name { font-size: clamp(28px,5vw,72px); line-height: 1.3; margin-bottom: clamp(6px,.8vw,12px); word-break: break-word; }
.coords { font-size: clamp(7px,.8vw,10px); color: #333; letter-spacing: 2px; margin-bottom: clamp(28px,4vw,52px); }
.temp-now { font-size: clamp(44px,8vw,100px); line-height: 1; margin: clamp(10px,1.5vw,20px) 0 clamp(8px,1vw,14px); }
.temp-unit { font-size: clamp(14px,2vw,26px); color: #555; vertical-align: super; margin-left: 4px; }
.feels { font-size: clamp(7px,.9vw,11px); color: #444; letter-spacing: 2px; margin-bottom: clamp(16px,2.5vw,32px); }
.compare { font-size: clamp(8px,1vw,13px); color: #555; letter-spacing: 1px; line-height: 2.6; margin-bottom: clamp(28px,4vw,52px); }
.compare-hl { font-size: clamp(9px,1.2vw,15px); color: #fff; display: block; margin: clamp(8px,1vw,14px) 0; letter-spacing: 1px; }
.meta { display: flex; gap: clamp(24px,4vw,64px); margin-bottom: clamp(28px,4vw,52px); flex-wrap: wrap; }
.meta-item { display: flex; flex-direction: column; gap: clamp(6px,.8vw,12px); }
.meta-lbl { font-size: clamp(7px,.8vw,10px); color: #333; letter-spacing: 2px; }
.meta-val { font-size: clamp(10px,1.4vw,18px); }
.period-row { display: flex; align-items: center; gap: clamp(10px,1.5vw,22px); padding: clamp(10px,1.4vw,18px) 0; border-top: 1px solid #111; }
.period-row:last-child { border-bottom: 1px solid #111; }
.pname { font-size: clamp(8px,1vw,13px); color: #555; width: clamp(72px,9vw,120px); letter-spacing: 1px; flex-shrink: 0; }
.ptemp-wind { display: flex; flex-direction: column; gap: 5px; }
.ptemp { font-size: clamp(10px,1.4vw,18px); }
.pwind { font-size: clamp(6px,.75vw,9px); color: #444; letter-spacing: 1px; }
.forecast-row { display: flex; align-items: center; gap: clamp(6px,1vw,14px); padding: clamp(8px,1.2vw,16px) 0; border-top: 1px solid #111; }
.forecast-row:last-child { border-bottom: 1px solid #111; }
.fday { font-size: clamp(7px,.85vw,11px); color: #444; width: clamp(22px,2.8vw,36px); letter-spacing: 1px; flex-shrink: 0; }
.fday.today { color: #fff; }
.flow { font-size: clamp(7px,.85vw,10px); color: #444; min-width: clamp(18px,2.5vw,30px); text-align: right; flex-shrink: 0; }
.fhigh { font-size: clamp(8px,1vw,12px); min-width: clamp(18px,2.5vw,30px); text-align: right; flex-shrink: 0; }
.range-wrap { flex: 1; height: 2px; background: #111; position: relative; min-width: 20px; }
.range-fill { position: absolute; top: 0; height: 2px; background: #fff; opacity: 0.2; }

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  body { padding: 24px 20px; padding-top: 64px; }
  .layout { flex-direction: column; gap: 40px; }
  .col-mid, .col-right { width: 100%; }
  .city-name { font-size: clamp(26px,9vw,44px); }
  .temp-now { font-size: clamp(52px,18vw,80px); }
  .picker-layout { flex-direction: column; }
  .city-search-wrap { width: 100%; position: static; }
  .city-list-wrap { column-count: 1; }
}
@media (min-width:701px) and (max-width:1024px) {
  .col-mid { width: clamp(160px,28vw,240px); }
  .col-right { width: clamp(130px,22vw,180px); }
  .city-name { font-size: clamp(24px,4.5vw,48px); }
  .city-list-wrap { column-count: 2; }
}
@media (min-width:1600px) {
  body { padding: 64px 96px; padding-top: 96px; }
  .city-name { font-size: clamp(56px,4.5vw,88px); }
  .temp-now { font-size: clamp(80px,7vw,120px); }
  .col-mid { width: 360px; }
  .col-right { width: 280px; }
}
</style>

<div class="side-panel" id="side-panel">
  <div class="panel-top">
    <div class="panel-title">SZUKAJ MIEJSCOWOSCI</div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <input class="city-search" id="panel-search-input" type="text" placeholder="NP. ZAKOPANE" autocomplete="off" spellcheck="false" oninput="onPanelInput(this.value)"/>
  <div class="search-results" id="panel-results"></div>
  <div id="panel-selected"></div>

<div id="app"><div class="loading">LADOWANIE...</div></div>

<script>
// ── PIXEL ICONS ────────────────────────────────────────────────────────────
function pxIcon(pixels, size) {
  const c=size/8; let s='';
  for(const [x,y,v] of pixels){
    const fill=v===2?'#fff':v===1?'#777':'#333';
    s+=`<rect x="${x*c}" y="${y*c}" width="${c}" height="${c}" fill="${fill}"/>`;
  }
  return `<svg class="px-icon" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">${s}</svg>`;
}
const ICONS = {
  sun:     [[3,0,1],[4,0,1],[0,3,1],[7,3,1],[1,1,1],[6,1,1],[2,2,2],[3,2,2],[4,2,2],[5,2,2],[1,3,2],[2,3,2],[3,3,2],[4,3,2],[5,3,2],[6,3,2],[2,4,2],[3,4,2],[4,4,2],[5,4,2],[1,5,1],[6,5,1],[0,4,1],[7,4,1],[3,7,1],[4,7,1]],
  cloud:   [[2,1,1],[3,1,2],[4,1,2],[5,1,1],[1,2,2],[2,2,2],[3,2,2],[4,2,2],[5,2,2],[6,2,2],[0,3,2],[1,3,2],[2,3,2],[3,3,2],[4,3,2],[5,3,2],[6,3,2],[7,3,2],[0,4,2],[1,4,2],[2,4,2],[3,4,2],[4,4,2],[5,4,2],[6,4,2],[7,4,2],[1,5,1],[2,5,1],[3,5,1],[4,5,1],[5,5,1],[6,5,1]],

  fog:     [[0,1,1],[1,1,2],[2,1,2],[3,1,2],[4,1,2],[5,1,2],[6,1,2],[7,1,1],[0,3,1],[1,3,1],[2,3,2],[3,3,2],[4,3,2],[5,3,2],[6,3,1],[7,3,1],[0,5,1],[1,5,2],[2,5,2],[3,5,2],[4,5,2],[5,5,2],[6,5,2],[7,5,1]],

};
function iconSize(b){const w=window.innerWidth;return w<480?Math.round(b*1.4):w<768?Math.round(b*1.2):w>1600?Math.round(b*1.6):b;}
function wmoIcon(code,b){
  const sz=iconSize(b);
  if(code===0)  return pxIcon(ICONS.sun,sz);
  if(code<=2)   return pxIcon(ICONS.partly,sz);
  if(code===3)  return pxIcon(ICONS.cloud,sz);
  if(code<=48)  return pxIcon(ICONS.fog,sz);
  if(code<=67)  return pxIcon(ICONS.rain,sz);
  if(code<=77)  return pxIcon(ICONS.snow,sz);
  if(code<=82)  return pxIcon(ICONS.rain,sz);
  if(code<=86)  return pxIcon(ICONS.snow,sz);
  return pxIcon(ICONS.thunder,sz);
}
function wmoDesc(code){
  if(code===0)return'BEZCHMURNIE';if(code<=2)return'CZ. ZACHMURZENIE';
  if(code===3)return'POCHMURNO';if(code<=48)return'MGLA';
  if(code<=55)return'MZAWKA';if(code<=67)return'DESZCZ';
  if(code<=77)return'SNIEG';if(code<=82)return'PRZELOTNY DESZCZ';
  if(code<=86)return'OPADY SNIEGU';return'BURZA';
}

// ── HELPERS ───────────────────────────────────────────────────────────────

const avg = a  => a.length?a.reduce((x,y)=>x+y)/a.length:0;

// ── API ───────────────────────────────────────────────────────────────────
async function getCityName(lat,lon){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=pl`);
    const d=await r.json();
    return(d.address?.city||d.address?.town||d.address?.village||'TWOJA LOKALIZACJA').toUpperCase();
  }catch{return'TWOJA LOKALIZACJA';}
}
async function fetchWeather(lat,lon){
  return(await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,weathercode,windspeed_10m,apparent_temperature&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto&past_days=1&forecast_days=11`)).json();
}

// ── LOAD + RENDER WEATHER ─────────────────────────────────────────────────
async function loadWeather(lat,lon,cityName){
  set(`<div class="loading">LADOWANIE POGODY...</div>`);
  try{
    const[data,city]=await Promise.all([fetchWeather(lat,lon),cityName?Promise.resolve(cityName):getCityName(lat,lon)]);
    renderWeather(data,city,lat,lon);
  }catch(e){set(`<div class="loading">BLAD: ${e.message}</div>`);}
}

function renderWeather(data,city,lat,lon){
  const h=data.hourly,d=data.daily,now=new Date();
  const todayStr=now.toISOString().slice(0,10);
  const tIdx=d.time.findIndex(t=>t===todayStr),yIdx=tIdx-1;
  const hOff=h.time.findIndex(t=>t.startsWith(todayStr)),curI=hOff+now.getHours();
  const curTemp=Math.round(h.temperature_2m[curI]),curFeels=Math.round(h.apparent_temperature[curI]);
  const curCode=h.weathercode[curI],curWind=Math.round(h.windspeed_10m[curI]);
  const todayMax=d.temperature_2m_max[tIdx],todayMin=d.temperature_2m_min[tIdx];
  const yestMax=yIdx>=0?d.temperature_2m_max[yIdx]:todayMax,diff=todayMax-yestMax;
  const arrKey=diff>2?'arrUp':diff<-2?'arrDn':'arrEq';
  const cmpTxt=diff>2?`CIEPLEJ NIZ WCZORAJ (+${Math.round(diff)}C)`:diff<-2?`CHLODNIEJ NIZ WCZORAJ (${Math.round(diff)}C)`:'PODOBNIE JAK WCZORAJ';

  const partsHTML=PARTS.map(p=>{
    const temps=h.temperature_2m.slice(hOff+p.s,hOff+p.e);
    const winds=h.windspeed_10m.slice(hOff+p.s,hOff+p.e);
    const codes=h.weathercode.slice(hOff+p.s,hOff+p.e);
    const code=codes[Math.floor(codes.length/2)]||0;
    return`<div class="period-row"><span class="pname">${p.name}</span>${wmoIcon(code,20)}<div class="ptemp-wind"><span class="ptemp">${Math.round(avg(temps))}°C</span><span class="pwind">${Math.round(avg(winds))} KM/H</span></div></div>`;
  }).join('');

  const forecast=[];
  for(let i=tIdx;i<Math.min(tIdx+10,d.time.length);i++){
    const dt=new Date(d.time[i]+'T12:00:00');
    forecast.push({name:DAYS[dt.getDay()],today:i===tIdx,code:d.weathercode[i],hi:Math.round(d.temperature_2m_max[i]),lo:Math.round(d.temperature_2m_min[i])});
  }
  const allLo=forecast.map(f=>f.lo),allHi=forecast.map(f=>f.hi);
  const minT=Math.min(...allLo),maxT=Math.max(...allHi),rng=maxT-minT||1;
  const forecastHTML=forecast.map(f=>{
    const bL=((f.lo-minT)/rng*100).toFixed(1),bW=((f.hi-f.lo)/rng*100).toFixed(1);
    return`<div class="forecast-row"><span class="fday${f.today?' today':''}">${f.name}</span>${wmoIcon(f.code,16)}<span class="flow">${f.lo}°</span><div class="range-wrap"><div class="range-fill" style="left:${bL}%;width:${bW}%"></div></div><span class="fhigh">${f.hi}°</span></div>`;
  }).join('');

  set(`
    <div class="clock" id="clk">${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}</div>
    <div class="layout">
      <div class="col-left">
        <div class="label">WITAJ W</div>
        <div class="city-name">${city}</div>
        <div class="coords">${lat.toFixed(4)} N  ${lon.toFixed(4)} E</div>
        ${wmoIcon(curCode,48)}
        <div class="temp-now">${curTemp}<span class="temp-unit">°C</span></div>
        <div class="feels">ODCZUWALNA ${curFeels}°C</div>
        <div class="compare">POGODA JEST<span class="compare-hl">${pxIcon(ICONS[arrKey],iconSize(12))} ${cmpTxt}</span>${wmoDesc(curCode)}</div>
        <div class="meta">
          <div class="meta-item"><span class="meta-lbl">WIATR</span><span class="meta-val">${curWind} KM/H</span></div>
          <div class="meta-item"><span class="meta-lbl">MAKS</span><span class="meta-val">${Math.round(todayMax)}°C</span></div>
          <div class="meta-item"><span class="meta-lbl">MIN</span><span class="meta-val">${Math.round(todayMin)}°C</span></div>
        </div>
      </div>
      <div class="col-mid"><div class="label">POGODA NA CALY DZIEN</div>${partsHTML}</div>
      <div class="col-right"><div class="label">PROGNOZA 10 DNI</div>${forecastHTML}</div>
    </div>`);

  setInterval(()=>{const n=new Date(),el=$('clk');if(el)el.textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;},1000);
}

// ── DENIED / CITY PICKER ──────────────────────────────────────────────────
function showDenied(errCode){
  const msgs={1:'ZABLOKOWANO DOSTEP DO LOKALIZACJI.',2:'NIE MOZNA USTALIC POZYCJI.',3:'PRZEKROCZONO CZAS OCZEKIWANIA.'};
  const hint=errCode===1
    ?`ABY ODBLOKOWAC: KLIKNIJ IKONKE <strong>KLODKI</strong> LUB <strong>"I"</strong><br>W PASKU ADRESU → LOKALIZACJA → ZEZWOL → ODSWIEZ STRONE.`
    :`SPRAWDZ CZY PRZEGLĄDARKA MA DOSTEP DO LOKALIZACJI<br>I SPROBUJ PONOWNIE.`;
  set(`
    <div class="denied-screen">
      <div class="denied-tag">JAKDZISIAJ.PL</div>
      <div class="denied-title">BRAK DOSTEPU<br>DO LOKALIZACJI</div>
      <div class="denied-desc">${msgs[errCode]||'LOKALIZACJA NIEDOSTEPNA.'}<br><br>${hint}</div>
      <div class="denied-btns">
        <button class="px-btn" onclick="tryGPS()">▸ SPROBUJ PONOWNIE</button>
        <button class="px-btn ghost" onclick="showCityPicker()">▸ ZNAJDZ RECZNIE</button>
      </div>
    </div>`);
}

function showCityPicker(){
  // group cities by first letter
  const groups={};
  CITIES.forEach(c=>{
    const l=c.name[0];
    if(!groups[l]) groups[l]=[];
    groups[l].push(c);
  });
  const listHTML=Object.keys(groups).sort().map(l=>`
    <div class="alpha-group">
      <div class="alpha-letter">${l}</div>
      ${groups[l].map(c=>`<span class="city-item" onclick="pickCity('${c.name}',${c.lat},${c.lon})">${c.name}</span>`).join('')}
    </div>`).join('');

  set(`
    <div class="picker-screen">
      <div class="picker-top">
        <div class="picker-title">WYBIERZ MIEJSCOWOSC</div>
        <button class="px-btn ghost" onclick="tryGPS()">▸ SPROBUJ GPS PONOWNIE</button>
      </div>
      <div class="picker-layout">
        <div class="city-list-wrap">${listHTML}</div>
        <div class="city-search-wrap">
          <div class="search-label">SZUKAJ MIEJSCOWOSCI</div>
          <input class="city-search" id="picker-search" type="text" placeholder="NP. ZAKOPANE" autocomplete="off" spellcheck="false" oninput="onPickerSearch(this.value)"/>
          <div class="search-results" id="picker-results"></div>
          <div id="picker-selected"></div>
        </div>
      </div>
    </div>`);
}

function pickCity(name,lat,lon){
  document.querySelectorAll('.city-item').forEach(el=>el.classList.remove('active'));
  event?.target?.classList.add('active');
  loadWeather(lat,lon,name);
}

// picker search
let pickerTimeout=null,pickerResults=[];
function onPickerSearch(val){
  clearTimeout(pickerTimeout);
  const el=$('picker-results');
  if(!el)return;
  if(!val||val.length<2){el.innerHTML='';return;}
  el.innerHTML=`<div class="search-hint">SZUKAM...</div>`;
  pickerTimeout=setTimeout(()=>doPickerSearch(val),420);
}
async function doPickerSearch(query){
  const el=$('picker-results');if(!el)return;
  try{
    const data=await(await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&countrycodes=pl&format=json&limit=8&accept-language=pl`)).json();
    pickerResults=data;
    if(!data.length){el.innerHTML=`<div class="sr-item" style="cursor:default;color:#222">BRAK WYNIKOW</div>`;return;}
    el.innerHTML=data.map((r,i)=>{
      const name=r.display_name.split(',').slice(0,2).join(', ').toUpperCase();
      const lat=parseFloat(r.lat).toFixed(4),lon=parseFloat(r.lon).toFixed(4);
      return`<div class="sr-item" onclick="selectPickerResult(${i})">${name}<span class="sr-coords">${lat} N  ${lon} E</span></div>`;
    }).join('');
  }catch{el.innerHTML=`<div class="sr-item" style="cursor:default;color:#222">BLAD WYSZUKIWANIA</div>`;}
}
function selectPickerResult(idx){
  const r=pickerResults[idx];if(!r)return;
  const lat=parseFloat(r.lat),lon=parseFloat(r.lon);
  const name=r.display_name.split(',')[0].toUpperCase();
  document.querySelectorAll('#picker-results .sr-item').forEach((el,i)=>el.classList.toggle('active',i===idx));
  const sel=$('picker-selected');
  if(sel)sel.innerHTML=`<div class="selected-box"><div class="selected-name">${name}</div><div class="selected-coord">${lat.toFixed(4)} N  ${lon.toFixed(4)} E</div><button class="px-btn" onclick="loadWeather(${lat},${lon},'${name}')">▸ POKAZ POGODE</button></div>`;
}

// ── SIDE PANEL SEARCH ─────────────────────────────────────────────────────

function selectPanelResult(idx){

// ── GPS ───────────────────────────────────────────────────────────────────
async function tryGPS(){
  set(`<div class="loading">POBIERANIE LOKALIZACJI...</div>`);
  if(!navigator.geolocation){showDenied(0);return;}
  const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:10000,enableHighAccuracy:false,maximumAge:300000})).catch(e=>({error:e}));
  if(pos?.error){showDenied(pos.error.code);return;}
  loadWeather(pos.coords.latitude,pos.coords.longitude,null);
}

async function init(){
  if(!navigator.geolocation){showDenied(0);return;}
  if(navigator.permissions){
    try{
      const perm=await navigator.permissions.query({name:'geolocation'});
      if(perm.state==='denied'){showDenied(1);return;}
      if(perm.state==='granted'){tryGPS();return;}
    }catch(_){}
  }
  tryGPS();
}

init();
</script>
